name: Bug report
description: Report a reproducible defect in code, docs, CI, or operator workflow.
title: "[Bug] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please do not include secrets, private keys, DSNs, or live account data.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the minimal steps needed to reproduce the problem.
      placeholder: |
        1. Run ...
        2. Observe ...
        3. Expected ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Python version, OS, entrypoint/command, and any relevant extras.
      placeholder: Python 3.10, macOS/Linux, uv extras, command used

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste sanitized logs only.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues first.
          required: true
        - label: I removed secrets and sensitive account data from this report.
          required: true
        - label: I read SECURITY.md if this could be security-sensitive.
          required: true
