name: Python CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.27"

      - name: Check lockfile
        run: uv lock --check

      - name: Install package
        run: uv sync --locked

      - name: Compile key modules
        run: >-
          uv run python -m compileall -q
          adapters
          contracts
          engine
          execution
          forecasting
          llm
          opportunity
          research
          risk
          scripts
          storage
          tests

      - name: Run advisory and docs contract regressions
        run: >-
          uv run python -m unittest
          tests.test_llm_advisory
          tests.test_operator_advisory_cli
          tests.test_docs_sync
          tests.test_fair_value_loader

      - name: Run unittest suite
        run: uv run python -m unittest discover -s tests -p "test_*.py"

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.27"

      - name: Check lockfile
        run: uv lock --check

      - name: Install reproducibility dependencies
        run: uv sync --locked --extra research

      - name: Run reproducible benchmark command
        run: make reproduce

      - name: Build Docker image
        run: docker build -t prediction-market-agent-repro .

      - name: Run Docker image
        run: docker run --rm prediction-market-agent-repro
