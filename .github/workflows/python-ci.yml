name: Python CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.27"

      - name: Check lockfile
        run: uv lock --check

      - name: Install package
        run: uv sync --locked

      - name: Compile key modules
        run: >-
          uv run python -m py_compile
          engine/runtime_policy.py
          engine/discovery.py
          engine/runner.py
          engine/safety_state.py
          engine/safety_store.py
          risk/limits.py
          research/calibration.py
          research/datasets.py
          research/fair_values.py
          research/replay.py
          research/paper.py
          research/schemas.py
          research/benchmark_runner.py
          research/benchmark_suite.py
          research/benchmark_reporting.py
          research/storage.py
          scripts/run_agent_loop.py
          scripts/operator_cli.py
          scripts/build_sports_fair_values.py
          scripts/refresh_sports_fair_values.py

      - name: Run unittest suite
        run: uv run python -m unittest discover -s tests -p "test_*.py"

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.27"

      - name: Check lockfile
        run: uv lock --check

      - name: Install reproducibility dependencies
        run: uv sync --locked --extra research

      - name: Run reproducible benchmark command
        run: make reproduce

      - name: Build Docker image
        run: docker build -t prediction-market-agent-repro .

      - name: Run Docker image
        run: docker run --rm prediction-market-agent-repro
