name: Python CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.27"

      - name: Check lockfile
        run: uv lock --check

      - name: Install package
        run: uv sync --locked

      - name: Compile key modules
        run: >-
          uv run python -m py_compile
          engine/runtime_policy.py
          engine/discovery.py
          engine/runner.py
          engine/safety_state.py
          engine/safety_store.py
          risk/limits.py
          research/calibration.py
          research/datasets.py
          research/data/__init__.py
          research/data/build_training_set.py
          research/data/capture_polymarket.py
          research/data/capture_sports_inputs.py
          research/data/schemas.py
          research/features/__init__.py
          research/features/joiners.py
          research/features/market_features.py
          research/features/sports_features.py
          research/fair_values.py
          research/models/__init__.py
          research/models/blend.py
          research/models/bradley_terry.py
          research/models/calibration.py
          research/models/elo.py
          research/replay.py
          research/paper.py
          research/schemas.py
          research/benchmark_runner.py
          research/benchmark_suite.py
          research/benchmark_reporting.py
          research/eval/__init__.py
          research/eval/dm_test.py
          research/eval/metrics.py
          research/eval/reports.py
          research/eval/walk_forward.py
          research/storage.py
          research/train/__init__.py
          research/train/train_blend.py
          research/train/train_bt.py
          research/train/train_elo.py
          adapters/polymarket/__init__.py
          adapters/polymarket/_legacy.py
          adapters/polymarket/clob_client.py
          adapters/polymarket/gamma_client.py
          adapters/polymarket/normalize.py
          adapters/polymarket/ws_market.py
          adapters/polymarket/ws_sports.py
          adapters/polymarket/ws_user.py
          scripts/config_loader.py
          scripts/ingest_live_data.py
          scripts/train_models.py
          scripts/build_fair_values.py
          scripts/run_agent_loop.py
          scripts/operator_cli.py
          scripts/build_sports_fair_values.py
          scripts/refresh_sports_fair_values.py

      - name: Run unittest suite
        run: uv run python -m unittest discover -s tests -p "test_*.py"

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.27"

      - name: Check lockfile
        run: uv lock --check

      - name: Install reproducibility dependencies
        run: uv sync --locked --extra research

      - name: Run reproducible benchmark command
        run: make reproduce

      - name: Build Docker image
        run: docker build -t prediction-market-agent-repro .

      - name: Run Docker image
        run: docker run --rm prediction-market-agent-repro
