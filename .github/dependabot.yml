version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python
    groups:
      python-dev-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "coverage*"
          - "pre-commit"
          - "pip-audit"
