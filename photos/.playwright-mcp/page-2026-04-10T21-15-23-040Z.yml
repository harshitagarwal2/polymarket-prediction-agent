                        - paragraph [ref=e1259]: Been seeing Dr. Agarwal for about 5 months now. While the treatment itself is working fine there are quite a few red flags that come with seeing Dr. Agarwal. The main one being on time to my appointments but Dr. Agarwal being late to almost every appointment I've gone to. Out of my 4 visits the first 2 were great where he was always in top of being attending me at my appt, but the last 2 in the other hand resulted in me waiting over 40 min to get my appointment started. To make things worse since everything is behind schedule my appointment itself is so quick and it seems like I am rushed to get me out for the next patient waiting to see Doctor. It is extremely disappointing and inconsiderate that my plans have to be shifted just to allocate for a quick 15 min appointment. I had schedule for a 9am time and the business hours are from 9am-5pm but why is it that I am here before Dr. Agarwal and his staff is here before him?
