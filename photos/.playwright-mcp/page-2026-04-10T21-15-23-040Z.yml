                            - text: (Copied from my google review)
                            - text: A little late, but a much-deserved review. I came to Dr. Agarwal almost 5 years ago to be seen for Sleep Apnea. I was initially with Kaiser and was told that, while I did have sleep apnea, my condition did not need any treatment despite my sharing with them my inability to stay awake during the day (even dosed off at a work meeting).
                            - text: After switching insurances, I googled around to find Dr. Agarwal and came in to receive a sleep study where it was discovered that the testing done at Kaiser was not done correctly, and I did need to receive treatment for my sleep apnea. I have moved out of the area but can still connect with Dr. Agarwal, thanks to virtual meetings. He has been thorough in providing me insight into my condition and has answered each question I have presented to him.
                            - text: 5 years later, I have noticed a difference in my energy levels, and I feel more rested than I could remember.
