                        - paragraph [ref=e1377]:
                          - generic [ref=e1378]:
                            - text: I'd rate this office with negative stars if I could, but my concern lies with the staff, not Dr. Agarwal himself. My mother was referred to Dr. Agarwal, and we were initially impressed to secure an appointment within a week. However, our experience quickly soured when we waited over two hours past our scheduled time to see him. During the visit, Dr. Agarwal ordered several tests and a bronchoscopy, which we promptly completed within a week. Unfortunately, the real problems began with the follow-up and procedure scheduling.
                            - text: At our initial visit, we were told a follow-up appointment would be scheduled for two weeks later and that we'd receive an email and a call from the office once they coordinated with my insurance. Three weeks passed with no email, no call, and no progress on my mother's prescription, which was never sent to the pharmacy despite multiple attempts to resolve the issue.
                            - text: I spoke with Christina, who claimed no results or prescriptions were in the system, but she promised to follow up. When she did, she confirmed ongoing issues with the prescription and mentioned that Michelle, who handles procedure scheduling, would contact us. Michelle eventually called, only to inform us that she needed to coordinate with the hospital for a procedure slot. She never followed up after that.
                            - text: This morning at 7:30 a.m. (08/19/2024), we received a call from the hospital informing us that my mother had missed her bronchoscopy--an appointment we were never informed about. We had to reschedule, and when I contacted the office again, I spoke with someone named Rossica/Jessica who refused to spell her name, then hung up on me. Despite calling back several times, she continued to hang up, adding to the already overwhelming frustration. To make matters worse, Rossica/Jessica insisted that it was our responsibility as the patient to call the hospital and set up the appointment ourselves, repeatedly implying it was our fault. This was particularly infuriating, as we were never given the hospital's contact information because Christina and Michelle had assured us they would handle it and call us back.
                            - text: Despite following all instructions and completing the required tests promptly, we encountered numerous failures regarding appointments, prescriptions, and follow-up care. My mother's prescription remains unprocessed, follow-up appointments were never communicated, and the bronchoscopy was missed due to a lack of notification. These lapses not only caused significant distress but also compromised my mother's health. As a daughter trying to secure proper care for my ailing mother, I am deeply disappointed and frustrated by the unprofessionalism and lack of communication at Dr. Agarwal's office. These persistent issues have turned this process into a stressful and unacceptable ordeal.
                            - text: For anyone considering Dr. Agarwal, please be aware of these serious issues with the office staff. The administrative failures and poor communication could have a serious impact on your care.
                            - text: To the office manager and owner, this situation is deeply concerning and warrants your immediate attention. I strongly urge you to take swift and decisive action to address these systemic failures. The level of service we encountered is unacceptable, and it is crucial that urgent improvements be made to safeguard the well-being of your patients.
