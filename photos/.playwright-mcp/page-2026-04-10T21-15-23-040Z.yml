                                - generic [ref=e1561]:
                                  - text: Thank you Lam. Your concern from the layman perspective is heard. Pumonary fibrosis has only TWO medications, that too after waiting for 50 years, and hence are costly. We had to jump through hoops to get approval by your father's insurance. I am sure you are aware that whole existence of the insurance company is to deny payment where ever possible and with slightest opportunity where patient or provider is not persistent. And guess what, this whole back and forth paperwork with insurance and multiple phone calls with prolonged wait is all NOT paid for! Staff dont come free, and I don't get a government salary! My time is my salary and spending hours and hours on this is to get my patients get the best! Unfortunately this is not common knowledge, including smart educated people like your kind self. You could have persevered few more visits and encouraged your father to continue the treatment that we onerously got approval.
                                  - text: Also, FDA (food and drug administration), DEA, Medical board of California and PHarma Codes are vigilant and really strict. Anti kickback statutes can take away license to practice medicine and jail time or other penalties are guaranteed. I assume you know people first hand who did that and are now being penalized. This office takes pride in doing the right thing and evidence based care, even though we are a private practice.
                                  - text: Please tell me the name of your father by virtue of call / email and I will be happy to refer him to another Physician of your choice. I wish you and your father the best of health.
