                          - generic [ref=e669]:
                            - text: I called around to 7 different Sleep Medicine Clinic's and couldn't get through past and answering machine. Called to Dr. Agarwal 's and got through instantly. Staff was very helpful and friendly over the phone even though I mentioned I was calling around. Eventually booked my appointment with Dr. Agarwal's office. Upon returning my sleep study device the next day, the staff informed me there was a patient who did not show so if I wanted to, I could be seen the same day. Great news!!! So, I was able come in the day prior and have my follow up with results the next day. Amazing. Truly thankful for Dr. Agarwal and his team for being so helpful and accommodating.
                            - text: Now about the care I received. Dr. Agarwal is highly knowledgeable and was willing to ask all of the hundreds of questions I had. What I would recommend for patients is, Dr. Agarwal can speak a bit fast so do pay attention or ask him to repeat or slow down if needed. Lots of information to share so I was able to fully follow and understand.
